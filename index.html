<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ПОЛОSКИ</title>
    <link rel="stylesheet" href="stylesheets/styles.css" />
    <link
      rel="icon"
      href="./images/icon.svg"
      type="image/x-icon"
    />
  </head>
  <body>
    <div id="custom-cursor" class="custom-cursor"></div>
    <div class="container">
    <div class="modal" id="modal1">
        <div class="modal-content">
            <img src="./images/podskazka1.svg">
        </div>
    </div>
    <div class="modal" id="modal2">
        <div class="modal-content">
            <img src="./images/podskazka2.svg">
        </div>
    </div>
    <div class="modal" id="modal3">
        <div class="modal-content">
            <img src="./images/podskazka3.svg">
        </div>
    </div>
    <div class="modal" id="modal4">
        <div class="modal-content">
            <img src="./images/podskazka4.svg">
        </div>
    </div>
    <div class="modal" id="modal5">
        <div class="modal-content">
            <img src="./images/travainfo.svg">
        </div>
    </div>
    <div class="modal" id="modal6">
        <div class="modal-content">
            <img src="./images/flowerinfo.svg">
        </div>
    </div>
    <div class="modal" id="modal7">
        <div class="modal-content">
            <img src="./images/treeinfo.svg">
        </div>
    </div>
        <div class="shapka"></div>
        <div>
            <img src="images/vopr1.svg" class="quest question-trigger" data-modal="modal1">
        </div>
        <div class="picktiger">
            <div class="animal-game">
                <div class="mix-stage" id="mixStage">
                    <div class="arrows left-arrows">
                        <button class="arrow arrow-head-left" id="headLeft"></button>
                        <button class="arrow arrow-body-left" id="bodyLeft"></button>
                        <button class="arrow arrow-legs-left" id="legsLeft"></button>
                    </div>
                    <div class="animal-assemble">
                        <div class="part head" id="headPart"></div>
                        <div class="part body" id="bodyPart"></div>
                        <div class="part legs" id="legsPart"></div>
                    </div>
                    <div class="arrows right-arrows">
                        <button class="arrow arrow-head-right" id="headRight"></button>
                        <button class="arrow arrow-body-right" id="bodyRight"></button>
                        <button class="arrow arrow-legs-right" id="legsRight"></button>
                    </div>
                </div>
                <div class="final-tiger" id="finalTiger"></div>
                <div class="confetti" id="confetti"></div>
            </div> 
            </div>
            <div>
                <img src="images/vopr1.svg" class="quest question-trigger" data-modal="modal1">
            </div>
        </div>
        <div class="adulttig" id="adulttig">
            <div class="tig-short"></div>
            <div class="tig-long"></div>
        </div>
        <div class="brush">
            <div>
                <img src="images/vopr2.svg" class="quest2 question-trigger" data-modal="modal2">
            </div>
            <div id="container">
                <div class="brushback">
                    <div class="draggable-elem">
                        <img src="./images/brush1.svg" />
                    </div>
                    <div class="draggable-elem">
                        <img src="./images/brush2.svg" />
                    </div>
                    <div class="draggable-elem">
                        <img src="./images/brush3.svg" />
                    </div>
                    <div class="draggable-elem">
                        <img src="./images/brush4.svg" />
                    </div>
                </div>
            </div>
        </div>
        <div class="ingridients">
            <img src="images/vopr3.svg" class="quest3 question-trigger" data-modal="modal3">
            <div class="whitecloud">
                <div class="lol">
                <div class="trava question-trigger" data-modal="modal5">
                    <img src="./images/trava.svg">
                </div>
                <div class="meow">
                <div class="flower question-trigger" data-modal="modal6">
                    <img src="./images/flower.svg" alt="">
                </div>
                <div class="tree question-trigger" data-modal="modal7">
                    <img src="./images/maslo.svg" alt="">
                </div>
                </div>
                </div>
            </div>
        </div>
        <div class="arttig">
            <div class="verh">
                <img src="./images/reverse.svg" class="swap-btn" id="swapBtn">
                <img src="images/vopr4.svg" class="quest4 question-trigger" data-modal="modal4">
            </div>
            <div class="tigart">
                <div class="tiger tiger-front" id="tiger"></div>
                <canvas id="drawCanvas" width="1440" height="1138"></canvas>
            </div>
        </div>
        <div class="family">
            <div class="tigri">
                <img src="./images/bigtigers.svg">
            </div>
            <div class="minihvost">
                <img src="./images/tailsmall.svg">
            </div>
            <div class="bighvost">
                <img src="./images/tailbig.svg">
            </div>
            <div class="risunok">
                <img src="./images/microtiger.svg">
            </div>
        </div>
        <div class="podval">
            <div class="left">
                <a href="https://hsedesign.ru/a">
                    <div class="hse"></div>
                </a>
                <a href="https://design.hse.ru/team/24503">
                    <div class="yri"></div>
                </a>
                <a href="https://hsedesign.ru/designer/21130">
                    <div class="sts"></div>
                </a>
            </div>
            <div class="right">
                <div class="grupp"></div>
                <a href="https://hsedesign.ru/designer/Chris">
                    <div class="mine"></div>
                </a>
                </div>
            </div>
        </div>
    </div>
    <script src="js/script.js"></script>
    <script src="js/brush.js"></script>
  </body>
</html>
